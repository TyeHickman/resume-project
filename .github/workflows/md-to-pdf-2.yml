name: Convert Markdown to PDF

on:
  push:
    paths:
      - '**/*.md'
  workflow_dispatch:
    inputs:
      path:
        description: 'Glob or file path to convert (optional)'
        required: false
        default: 'templates/example.md'
      debug:
        description: 'Include intermediary HTML files in artifact (true/false)'
        required: false
        default: 'true'

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Pandoc and wkhtmltopdf
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc wkhtmltopdf fonts-dejavu-core

      - name: Convert Markdown -> HTML -> PDF (with optional stylesheet)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p output
          PATTERN="${{ github.event.inputs.path }}"
          PATTERN="${PATTERN:-**/*.md}"
          files=$(git ls-files $PATTERN || true)
          if [ -z "$files" ]; then
            echo "No markdown files found for pattern: $PATTERN"
            exit 0
          fi
          for f in $files; do
            base=$(basename "$f" .md)
            dir=$(dirname "$f")
            html="output/${base}.html"
            out="output/${base}.pdf"

            # Prefer a stylesheet named 'style.css' next to the markdown, fallback to .github/styles/markdown.css if present
            css_arg=""
            if [ -f "${dir}/style.css" ]; then
              css_arg="--css=${dir}/style.css"
              echo "Using stylesheet: ${dir}/style.css"
            elif [ -f ".github/styles/markdown.css" ]; then
              css_arg="--css=.github/styles/markdown.css"
              echo "Using stylesheet: .github/styles/markdown.css"
            else
              echo "No stylesheet found for $f — rendering with default styles"
            fi

            echo "Converting $f -> $html (HTML)"
            # Embed CSS and resources into the HTML so wkhtmltopdf can render without missing files
            pandoc "$f" -s --to html5 $css_arg --self-contained -o "$html"

            echo "Rendering $html -> $out (PDF via wkhtmltopdf)"
            wkhtmltopdf --enable-local-file-access "$html" "$out"
          done

      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: markdown-pdfs
          path: |
            output/*.pdf
            ${{ github.event.inputs.debug == 'true' && 'output/*.html' || '' }}
